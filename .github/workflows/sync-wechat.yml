name: Sync WeChat Articles

on:
  schedule:
    - cron: '0 23,11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get WeChat Access Token
        id: token
        run: |
          RESPONSE=$(curl -s "https://api.weixin.qq.com/cgi-bin/token?grant_type=client_credential&appid=${{ secrets.WX_APPID }}&secret=${{ secrets.WX_APPSECRET }}")
          ACCESS_TOKEN=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))")
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "Failed to get access_token"
            echo "$RESPONSE"
            exit 1
          fi
          echo "token=$ACCESS_TOKEN" >> $GITHUB_OUTPUT

      - name: Fetch Published Articles
        id: fetch
        run: |
          python3 << 'PYEOF'
          import json, subprocess, os
          from datetime import datetime

          access_token = os.environ.get('ACCESS_TOKEN', '')
          api_articles = {}

          # 只从 freepublish 接口获取已发布文章
          offset = 0
          page_size = 20
          while True:
              cmd = [
                  'curl', '-s', '-X', 'POST',
                  f'https://api.weixin.qq.com/cgi-bin/freepublish/batchget?access_token={access_token}',
                  '-H', 'Content-Type: application/json',
                  '-d', json.dumps({'offset': offset, 'count': page_size, 'no_content': 1})
              ]
              result = subprocess.run(cmd, capture_output=True, text=True)
              data = json.loads(result.stdout)
              if 'errcode' in data and data['errcode'] != 0:
                  print(f'freepublish API error: {data}')
                  break
              items = data.get('item', [])
              for item in items:
                  news_item = item.get('content', {}).get('news_item', [])
                  publish_time = item.get('update_time', 0)
                  date_str = datetime.fromtimestamp(publish_time).strftime('%Y-%m-%d') if publish_time else ''
                  for news in news_item:
                      url = news.get('url', '')
                      if url and url not in api_articles:
                          api_articles[url] = {
                              'title': news.get('title', ''),
                              'url': url,
                              'thumb': news.get('thumb_url', ''),
                              'date': date_str
                          }
              if len(items) < page_size:
                  break
              offset += page_size

          print(f'freepublish: {len(api_articles)} articles')

          # 读取已有文章，保留有URL的（非API来源的历史文章）
          existing_path = 'docs/data/articles.json'
          if os.path.exists(existing_path):
              with open(existing_path, 'r', encoding='utf-8') as f:
                  existing = json.load(f)
              # 保留已有但API中没有的（历史数据）
              for a in existing:
                  url = a.get('url', '')
                  if url and url not in api_articles:
                      api_articles[url] = a

          # 合并、按日期倒序
          all_articles = sorted(api_articles.values(), key=lambda x: x.get('date', ''), reverse=True)

          with open(existing_path, 'w', encoding='utf-8') as f:
              json.dump(all_articles, f, ensure_ascii=False, indent=2)

          print(f'Total: {len(all_articles)} articles')
          PYEOF
        env:
          ACCESS_TOKEN: ${{ steps.token.outputs.token }}

      - name: Check for Changes
        id: check
        run: |
          if git diff --quiet docs/data/articles.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/articles.json
          git commit -m "🔄 同步公众号文章 $(date +%Y-%m-%d)"
          git push
