name: Sync WeChat Articles

on:
  schedule:
    # 每天早上7点和晚上7点各跑一次
    - cron: '0 23,11 * * *'  # UTC 23:00=北京时间7:00, UTC 11:00=北京时间19:00
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get WeChat Access Token
        id: token
        run: |
          RESPONSE=$(curl -s "https://api.weixin.qq.com/cgi-bin/token?grant_type=client_credential&appid=${{ secrets.WX_APPID }}&secret=${{ secrets.WX_APPSECRET }}")
          ACCESS_TOKEN=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))")
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "Failed to get access_token"
            echo "$RESPONSE"
            exit 1
          fi
          echo "token=$ACCESS_TOKEN" >> $GITHUB_OUTPUT

      - name: Fetch Published Articles
        id: fetch
        run: |
          ACCESS_TOKEN="${{ steps.token.outputs.token }}"
          
          # 分页获取最近一年的已发布文章（只读API，不会修改任何数据）
          python3 -c "
          import json, subprocess, os
          from datetime import datetime, timedelta
          
          access_token = os.environ.get('ACCESS_TOKEN', '')
          all_articles = []
          offset = 0
          page_size = 20
          one_year_ago = datetime.now() - timedelta(days=365)
          stop_paging = False
          
          while not stop_paging:
              cmd = [
                  'curl', '-s', '-X', 'POST',
                  f'https://api.weixin.qq.com/cgi-bin/freepublish/batchget?access_token={access_token}',
                  '-H', 'Content-Type: application/json',
                  '-d', json.dumps({'offset': offset, 'count': page_size, 'no_content': 1})
              ]
              result = subprocess.run(cmd, capture_output=True, text=True)
              data = json.loads(result.stdout)
              
              if 'errcode' in data and data['errcode'] != 0:
                  print(f'API error: {data}')
                  break
              
              items = data.get('item', [])
              for item in items:
                  news_item = item.get('content', {}).get('news_item', [])
                  publish_time = item.get('update_time', 0)
                  if publish_time:
                      pub_date = datetime.fromtimestamp(publish_time)
                      if pub_date < one_year_ago:
                          stop_paging = True
                          break
                      date_str = pub_date.strftime('%Y-%m-%d')
                  else:
                      date_str = ''
                  for news in news_item[:1]:
                      all_articles.append({
                          'title': news.get('title', ''),
                          'url': news.get('url', ''),
                          'thumb': news.get('thumb_url', ''),
                          'date': date_str
                      })
              
              if len(items) < page_size or stop_paging:
                  break
              offset += page_size
          
          with open('docs/data/articles.json', 'w', encoding='utf-8') as f:
              json.dump(all_articles, f, ensure_ascii=False, indent=2)
          
          print(f'Fetched {len(all_articles)} articles (last 365 days)')
          "
        env:
          ACCESS_TOKEN: ${{ steps.token.outputs.token }}

      - name: Check for Changes
        id: check
        run: |
          if git diff --quiet docs/data/articles.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/articles.json
          git commit -m "🔄 同步公众号文章 $(date +%Y-%m-%d)"
          git push
